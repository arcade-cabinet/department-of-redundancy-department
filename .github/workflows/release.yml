name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch or tag)'
        default: 'main'
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v4.1.3
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    # Fire on either: (a) release-please created a new release this run, or
    # (b) manual workflow_dispatch with an explicit ref (e.g. to rebuild
    # artifacts for an existing tag after a CI infra fix).
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build
        env: { NODE_ENV: production }

      - name: Package web tarball
        run: tar -czf department-of-redundancy-department-web.tar.gz dist/

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          files: department-of-redundancy-department-web.tar.gz

  build-android:
    needs: release-please
    # See build-release gate above for rationale.
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      # Capacitor 8.x requires Java 21 (compileOptions in
      # android/capacitor-cordova-android-plugins/build.gradle pin
      # JavaVersion.VERSION_21). Java 17 fails with
      # `error: invalid source release: 21`.
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with: { java-version: '21', distribution: 'temurin' }
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - run: pnpm install --frozen-lockfile

      # Build the web bundle Capacitor needs to bundle into the APK/AAB.
      # CAPACITOR=true sets vite `base: '/'` and disables sourcemaps so
      # the asset paths resolve inside the WebView's `file://` scheme.
      - name: Build native web bundle
        run: pnpm build:native

      # Sync the dist/ → android/app/src/main/assets/public/ before
      # gradle bundles. Without this the .aab would ship a stale or
      # empty `public/` folder.
      - name: Capacitor sync (Android)
        run: pnpm exec cap sync android

      # Decode the upload-signing keystore from a base64 secret. We
      # derive the keystore path from the workspace root so the gradle
      # signing config below can reference it via env vars.
      #
      # If ANDROID_KEYSTORE_BASE64 is unset (e.g. on a fork) we skip
      # signing and produce an unsigned debug-keyed AAB so the job
      # still proves the toolchain is wired. Once secrets are
      # provisioned, the signed-release path activates automatically.
      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload.keystore" >> "$GITHUB_ENV"

      # Build the Android App Bundle. When the keystore env vars are
      # set, gradle picks them up via android/app/build.gradle's
      # signingConfigs.release block (added below as part of B.5);
      # otherwise it falls back to the default debug signing.
      - name: Gradle bundleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # Locate + rename the AAB so the GitHub Release attaches a
      # version-stamped artifact instead of the generic `app-release.aab`.
      - name: Stage AAB for release
        run: |
          AAB=$(find android/app/build/outputs/bundle -name '*.aab' | head -n 1)
          if [ -z "$AAB" ]; then
            echo "::error::No .aab produced by gradle bundleRelease"
            exit 1
          fi
          mkdir -p artifacts
          cp "$AAB" "artifacts/dord-${{ needs.release-please.outputs.tag_name || inputs.ref }}.aab"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          files: artifacts/*.aab

  build-ios:
    needs: release-please
    # See build-release gate above for rationale.
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 60
    # iOS shipping requires Apple Developer credentials AND a
    # Capacitor plugin set that compiles cleanly against core 8.3.1.
    # Until both land, treat iOS as best-effort: the job runs to
    # surface drift but does not fail the release pipeline. Web
    # bundle + Android .aab continue to ship from the same workflow.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          lfs: true

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }

      # macos-14 has Xcode 15.4 (Swift 5.10) and 16.1/16.2 (Swift 6.0).
      # Capacitor 8.x plugins (status-bar@8.0.2, splash-screen@8.0.1)
      # use Swift 5.x existential semantics on CAPBridgeProtocol that
      # Swift 6.0 strict-mode rejects ("any P has no member X" for
      # webView/viewController/etc). Pin to 15.4 (Swift 5.10) until
      # the plugin set ships Swift-6-compatible swift sources.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - run: pnpm install --frozen-lockfile

      # Sync MARKETING_VERSION + CURRENT_PROJECT_VERSION in pbxproj
      # to package.json (which release-please bumps). Must run before
      # xcodebuild archive so the .ipa carries the right version.
      - name: Sync iOS version from package.json
        run: node scripts/sync-ios-version.mjs

      - name: Build native web bundle
        run: pnpm build:native

      # Sync dist/ → ios/App/App/public/ before xcodebuild bundles.
      # Without this the .ipa would ship a stale or empty public/ folder.
      # Capacitor 8.x uses Swift Package Manager (CapApp-SPM/) — no
      # CocoaPods step needed; xcodebuild resolves SPM deps itself.
      - name: Capacitor sync (iOS)
        run: pnpm exec cap sync ios

      # Decode signing materials from base64 secrets into a temporary
      # keychain. Skipped on forks (secrets unset) so the toolchain
      # still validates by trying to archive (it'll fail at signing,
      # which is expected without certs — the rest of the pipeline
      # gets validated up to that point).
      #
      # APPSTORE_API_KEY_BASE64 + APPSTORE_API_KEY_ID + APPSTORE_API_ISSUER_ID
      # are used by altool/xcrun for App Store Connect uploads.
      # APPLE_DISTRIBUTION_CERT_BASE64 + APPLE_CERT_PASSWORD set up the
      # signing identity in a temp keychain.
      # APPLE_PROVISIONING_PROFILE_BASE64 installs the matching profile.
      - name: Install signing materials
        if: env.APPLE_DISTRIBUTION_CERT_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_DISTRIBUTION_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/dord.mobileprovision"

          API_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "$APPSTORE_API_KEY_BASE64" | base64 --decode > "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"

      # Archive the iOS app. The ExportOptions.plist controls signing
      # method (app-store) and team identifier — committed under
      # ios/App/ExportOptions.plist with placeholder values that the
      # workflow overwrites at runtime via PlistBuddy.
      # Capacitor 8.x uses Swift Package Manager — only App.xcodeproj
      # exists, no .xcworkspace (CocoaPods would have generated that).
      # Use -project rather than -workspace.
      #
      # When signing secrets are not configured (forks, repos without
      # an Apple Developer account), produce an unsigned archive so the
      # build pipeline still validates end-to-end. The exportArchive
      # step downstream is gated on the same secret and will skip — no
      # .ipa is produced, but the archive proves the toolchain wires up.
      - name: xcodebuild archive
        working-directory: ios/App
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
        run: |
          set -euo pipefail
          ARGS=(
            -project App.xcodeproj
            -scheme App
            -configuration Release
            -archivePath "$RUNNER_TEMP/App.xcarchive"
            -destination 'generic/platform=iOS'
          )
          if [ -n "${APPLE_DISTRIBUTION_CERT_BASE64:-}" ]; then
            ARGS+=(-allowProvisioningUpdates)
          else
            echo "::notice::No signing secrets configured — building unsigned archive (validation only, no .ipa will be produced)"
            ARGS+=(CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS="")
          fi
          xcodebuild "${ARGS[@]}" archive

      - name: xcodebuild exportArchive
        if: env.APPLE_DISTRIBUTION_CERT_BASE64 != ''
        working-directory: ios/App
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Materialize ExportOptions.plist with the team ID baked in.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Stage IPA for release
        if: env.APPLE_DISTRIBUTION_CERT_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
        run: |
          set -euo pipefail
          IPA=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -n 1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa produced by xcodebuild exportArchive"
            exit 1
          fi
          mkdir -p artifacts
          cp "$IPA" "artifacts/dord-${{ needs.release-please.outputs.tag_name || inputs.ref }}.ipa"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        if: env.APPLE_DISTRIBUTION_CERT_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.ref }}
          files: artifacts/*.ipa
