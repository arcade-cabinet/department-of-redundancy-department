name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  release-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test:node
      - run: pnpm exec playwright install chromium
      - run: pnpm run test:e2e:ci

  deploy-pages:
    needs: release-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Build (JS bundle — no LFS yet)
        run: pnpm run build
        env:
          NODE_ENV: production
          GITHUB_PAGES: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Restore LFS assets into dist (idempotent)
        run: |
          if git lfs ls-files | grep -q '^'; then
            git lfs fetch --include="public/assets/audio/,public/assets/models/,public/assets/hdri/" || true
            git lfs checkout public/assets/audio public/assets/models public/assets/hdri || true
            for d in audio models hdri; do
              if [ -d "public/assets/$d" ]; then
                rm -rf "dist/assets/$d"
                cp -r "public/assets/$d" "dist/assets/$d"
              fi
            done
          fi

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  validate-deployed:
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.33.0 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium
      - name: Validate live deploy
        env:
          DORD_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: pnpm exec playwright test --grep '@golden|@perf'
